global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: generator
    static_configs:
      - targets: ["generator:9100"]
  - job_name: fraud
    static_configs:
      - targets: ["fraud:9100"]
  - job_name: read-api
    static_configs:
      - targets: ["read-api:9100"]
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
