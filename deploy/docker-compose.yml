name: cdr

# One command brings up the whole core: infra (Kafka KRaft + Postgres + Redis)
# plus the four service skeletons. Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up --build -d   (or: make up)

services:
  # --- Infrastructure ---------------------------------------------------------

  kafka:
    image: apache/kafka:3.8.1
    container_name: cdr-kafka
    ports:
      - "29092:29092" # host-facing listener (in-network services use kafka:9092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  postgres:
    image: postgres:16-alpine
    container_name: cdr-postgres
    environment:
      POSTGRES_USER: cdr
      POSTGRES_PASSWORD: cdr
      POSTGRES_DB: cdr
    ports:
      - "5433:5432" # host 5433 -> container 5432 (5432 sık dolu olur)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdr -d cdr"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cdr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --- Services (Faz 0: skeletons that boot and idle) -------------------------

  generator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: generator
    container_name: cdr-generator
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      RATE: "10" # normal calls/sec across the pool
      BURST_EVERY: "15" # inject a velocity burst every N seconds
      BURST_SIZE: "15" # calls per burst (must exceed the fraud threshold)
      TRAVEL_EVERY: "20" # inject an impossible-travel jump every N seconds
    depends_on:
      kafka:
        condition: service_healthy

  fraud:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: fraud
    container_name: cdr-fraud
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      VELOCITY_WINDOW_SEC: "60"
      VELOCITY_THRESHOLD: "12"
      SUBSCRIBER_ADDR: subscriber:50051
      IMPOSSIBLE_TRAVEL_MAX_KMH: "1000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      subscriber:
        condition: service_started

  subscriber:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: subscriber
    container_name: cdr-subscriber
    restart: unless-stopped
    environment:
      GRPC_ADDR: ":50051" # gRPC reference-data server (cell -> geo)

  read-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: read-api
    container_name: cdr-read-api
    restart: unless-stopped
    ports:
      - "8090:8080" # host 8090 -> container 8080
    environment:
      HTTP_ADDR: ":8080"
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: "postgres://cdr:cdr@postgres:5432/cdr?sslmode=disable"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
