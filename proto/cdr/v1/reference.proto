syntax = "proto3";

package cdr.v1;

option go_package = "github.com/ahaygun/go-cdr-fraud-detector/gen/cdr/v1;cdrv1";

// Reference is the subscriber-service's gRPC API: static reference data used to
// enrich fraud checks.
//   - GetCell    → cell geo (for impossible-travel)
//   - GetTariff  → destination tariff (for IRSF spend tracking)
service Reference {
  // GetCell returns the geographic location of a cell tower.
  rpc GetCell(GetCellRequest) returns (Cell);
  // GetTariff returns the tariff for a destination MSISDN (by dialing prefix).
  rpc GetTariff(GetTariffRequest) returns (Tariff);
}

message GetCellRequest {
  string cell_id = 1;
}

message Cell {
  string cell_id = 1;
  double lat = 2;
  double lon = 3;
  string name = 4;
}

message GetTariffRequest {
  string destination = 1; // callee MSISDN
}

message Tariff {
  string prefix = 1;
  double rate_per_min = 2;
  bool premium = 3;
  string name = 4;
}
